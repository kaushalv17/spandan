name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e "./ai[dev]"
      - run: cd ai && ruff check . && mypy spandan_ai && pytest -q
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: spandan
          POSTGRES_PASSWORD: spandan
          POSTGRES_DB: spandan_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U spandan" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd backend && npm ci && npm run lint && npm run typecheck && npm test
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci && npm run typecheck && npm test
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # docker compose resolves `env_file: .env` for every service at build time,
      # so provide one from the committed template before building.
      - run: cp .env.example .env
      - run: docker compose build
