repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-requests]
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd backend && npm run lint'
        language: system
        files: \.(ts|tsx)$
