services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: spandan
      POSTGRES_PASSWORD: spandan
      POSTGRES_DB: spandan
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spandan"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spandan
      MINIO_ROOT_PASSWORD: spandanminio
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
  ai:
    build: ./ai
    env_file: .env
    depends_on: [postgres, redis, minio]
    ports: ["8001:8001"]
  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8080:8080"]
  frontend:
    build: ./frontend
    env_file: .env
    depends_on: [backend]
    ports: ["3000:3000"]
volumes:
  pgdata:
  miniodata:
